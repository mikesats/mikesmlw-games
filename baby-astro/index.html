        function drawLeaderboardView() {
            const cx = canvas.width / 2;
            const cw = canvas.width;
            const ch = canvas.height;

            // Dark background
            ctx.fillStyle = 'rgba(5, 5, 15, 0.95)';
            ctx.fillRect(0, 0, cw, ch);

            ctx.textAlign = 'center';

            // Title
            ctx.fillStyle = '#C8A44A';
            ctx.font = '700 ' + Math.floor(cw * 0.05) + 'px Cinzel, "Times New Roman", serif';
            ctx.fillText('LEADERBOARD', cx, ch * 0.08);

            // Subtitle
            ctx.fillStyle = 'rgba(200, 164, 74, 0.5)';
            ctx.font = Math.floor(cw * 0.03) + 'px Arial';
            ctx.fillText('WORLDWIDE TOP 50', cx, ch * 0.12);

            // Decorative line
            ctx.strokeStyle = 'rgba(200, 164, 74, 0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(cx - cw * 0.35, ch * 0.14);
            ctx.lineTo(cx + cw * 0.35, ch * 0.14);
            ctx.stroke();

            // Column headers
            const headerY = ch * 0.17;
            const leftX = cw * 0.08;
            const nameX = cw * 0.18;
            const depthX = cw * 0.72;
            const zoneX = cw * 0.92;

            ctx.fillStyle = 'rgba(200, 164, 74, 0.6)';
            ctx.font = 'bold 10px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('#', leftX, headerY);
            ctx.fillText('PLAYER', nameX, headerY);
            ctx.textAlign = 'right';
            ctx.fillText('DEPTH', depthX, headerY);
            ctx.fillText('ZONE', zoneX, headerY);

            // Entries
            const entries = leaderboardData.slice(0, 50);
            const startY = headerY + 20;
            const rowH = Math.min(16, (ch * 0.72) / Math.max(entries.length, 1));

            for (let i = 0; i < entries.length; i++) {
                const entry = entries[i];
                const y = startY + i * rowH;
                const rank = i + 1;

                // Highlight top 3
                if (rank <= 3) {
                    const medals = ['#FFD700', '#C0C0C0', '#CD7F32'];
                    ctx.fillStyle = medals[rank - 1];
                    ctx.font = 'bold 12px Arial';
                } else {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                    ctx.font = '11px Arial';
                }

                ctx.textAlign = 'left';
                ctx.fillText(rank + '.', leftX, y);
                const name = entry.player_name.length > 12 ? entry.player_name.slice(0, 11) + '...' : entry.player_name;
                ctx.fillText(name, nameX, y);
                ctx.textAlign = 'right';
                ctx.fillText(Math.floor(entry.depth), depthX, y);
                // Abbreviate zone name
                const zoneShort = (entry.zone || '').split(' ').map(w => w[0]).join('');
                ctx.font = '9px Arial';
                ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
                ctx.fillText(zoneShort, zoneX, y);
            }

            if (entries.length === 0) {
                ctx.textAlign = 'center';
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.font = '14px Arial';
                ctx.fillText('No scores yet. Be the first!', cx, ch * 0.4);
            }

            // Back button
            const backBtnY = ch * 0.92;
            const backBtnW = cw * 0.4;
            const backBtnH = 34;
            const backBtnX = cx - backBtnW / 2;

            ctx.fillStyle = 'rgba(200, 164, 74, 0.12)';
            roundRect(ctx, backBtnX, backBtnY, backBtnW, backBtnH, 8);
            ctx.fill();
            ctx.strokeStyle = 'rgba(200, 164, 74, 0.4)';
            ctx.lineWidth = 1;
            roundRect(ctx, backBtnX, backBtnY, backBtnW, backBtnH, 8);
            ctx.stroke();

            ctx.textAlign = 'center';
            ctx.fillStyle = '#C8A44A';
            ctx.font = '700 ' + Math.floor(cw * 0.035) + 'px Cinzel, "Times New Roman", serif';
            ctx.fillText('BACK', cx, backBtnY + 23);
            backButtonRect = { x: backBtnX, y: backBtnY, w: backBtnW, h: backBtnH };
        }

        function drawDeath() {
            const elapsed = deathTime;
            const cx = canvas.width / 2;

            // Flash on death
            if (elapsed < 0.4) {
                ctx.globalAlpha = 1 - elapsed * 2.5;
                ctx.fillStyle = '#FF6B9D';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.globalAlpha = 1;
            }

            // Dark overlay (fade in)
            const overlayAlpha = Math.min(elapsed * 2, 0.88);
            ctx.fillStyle = 'rgba(5, 5, 15, ' + overlayAlpha + ')';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Wait for overlay before showing content
            if (elapsed < 0.4) return;

            const contentAlpha = Math.min((elapsed - 0.4) * 3, 1);
            ctx.globalAlpha = contentAlpha;

            // Count-up animation
            const countDuration = 1.2;
            const countElapsed = Math.max(0, elapsed - 0.5);
            const countProgress = Math.min(countElapsed / countDuration, 1);
            // Ease out
            const eased = 1 - Math.pow(1 - countProgress, 3);
            const displayDepth = Math.floor(depth * eased);

            ctx.textAlign = 'center';

            if (isNewBest) {
                // ============================================
                // NEW HIGH SCORE SCREEN (shareable / screenshottable)
                // ============================================

                // Subtle animated glow behind the card
                const glowPulse = 0.3 + 0.15 * Math.sin(elapsed * 2);
                const glow = ctx.createRadialGradient(cx, canvas.height * 0.42, 0, cx, canvas.height * 0.42, canvas.width * 0.6);
                glow.addColorStop(0, 'rgba(245, 166, 35, ' + glowPulse + ')');
                glow.addColorStop(0.5, 'rgba(245, 166, 35, 0.05)');
                glow.addColorStop(1, 'rgba(245, 166, 35, 0)');
                ctx.fillStyle = glow;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // "NEW RECORD" banner
                const bannerY = canvas.height * 0.12;
                ctx.fillStyle = '#F5A623';
                ctx.font = 'bold 14px Arial';
                ctx.letterSpacing = '6px';
                ctx.fillText('★  N E W   R E C O R D  ★', cx, bannerY);

                // Game title
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.font = '11px Arial';
                ctx.fillText('THE ADVENTURES OF', cx, bannerY + 28);
                ctx.fillStyle = '#FFFFFF';
                ctx.font = 'bold 22px Arial';
                ctx.fillText('Baby Astro!', cx, bannerY + 52);

                // Draw Baby Astro in the center (larger, celebratory)
                const babyDrawY = canvas.height * 0.33;
                ctx.save();
                ctx.translate(cx, babyDrawY);
                // Gentle float
                ctx.translate(0, Math.sin(elapsed * 2) * 4);
                ctx.scale(2.2, 2.2);
                // Force boost active for flame effect
                const wasBoost = player.boostActive;
                player.boostActive = true;
                const savedX = player.x;
                const savedY = player.y;
                player.x = 0;
                player.y = 0;
                player.rotation = -0.1;
                drawBaby();
                player.x = savedX;
                player.y = savedY;
                player.boostActive = wasBoost;
                ctx.restore();

                // Stats card
                const cardTop = canvas.height * 0.5;
                const cardW = canvas.width * 0.75;
                const cardH = canvas.height * 0.26;
                const cardX = cx - cardW / 2;

                // Card background
                ctx.fillStyle = 'rgba(255, 255, 255, 0.06)';
                roundRect(ctx, cardX, cardTop, cardW, cardH, 12);
                ctx.fill();
                ctx.strokeStyle = 'rgba(245, 166, 35, 0.3)';
                ctx.lineWidth = 1;
                roundRect(ctx, cardX, cardTop, cardW, cardH, 12);
                ctx.stroke();

                // Depth (big number)
                const depthY = cardTop + 40;
                ctx.fillStyle = '#F5A623';
                ctx.font = 'bold 48px Arial';
                ctx.fillText(displayDepth, cx, depthY + 10);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.font = '11px Arial';
                ctx.fillText('DEPTH REACHED', cx, depthY + 34);

                // Divider line
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(cardX + 20, depthY + 52);
                ctx.lineTo(cardX + cardW - 20, depthY + 52);
                ctx.stroke();

                // Zone row
                const rowY = depthY + 80;
                ctx.fillStyle = '#FFFFFF';
                ctx.font = 'bold 18px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(deathZoneName, cx, rowY);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.font = '10px Arial';
                ctx.fillText('ZONE', cx, rowY + 16);

                // Previous best
                const prevBestY = cardTop + cardH + 22;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.font = '12px Arial';
                const prevBest = Math.floor(bestDepth) === Math.floor(depth) ? Math.floor(depth - 1) : Math.floor(bestDepth);
                if (prevBest > 0) {
                    ctx.fillText('Previous best: ' + prevBest, cx, prevBestY);
                }

                // Leaderboard submission on new best screen too
                if (elapsed > 1.5 && !deathInputLocked && deathScreenPhase !== 'submitted' && !scoreSubmitted) {
                    const inputY = prevBestY + 20;
                    const inputW = canvas.width * 0.6;
                    const inputH = 36;
                    const inputX = cx - inputW / 2;

                    ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
                    roundRect(ctx, inputX, inputY, inputW, inputH, 8);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(245, 166, 35, 0.3)';
                    ctx.lineWidth = 1;
                    roundRect(ctx, inputX, inputY, inputW, inputH, 8);
                    ctx.stroke();

                    nameInputRect = { x: inputX, y: inputY, w: inputW, h: inputH };

                    ctx.fillStyle = '#FFFFFF';
                    ctx.font = '16px Arial';
                    ctx.textAlign = 'center';
                    const displayName = playerNameForScore || 'Enter name...';
                    ctx.fillText(displayName, cx, inputY + 24);

                    const submitY = inputY + inputH + 12;
                    const submitW = canvas.width * 0.5;
                    const submitH = 32;
                    const submitX = cx - submitW / 2;

                    ctx.fillStyle = playerNameForScore.length > 0 ? 'rgba(245, 166, 35, 0.8)' : 'rgba(150, 150, 150, 0.5)';
                    roundRect(ctx, submitX, submitY, submitW, submitH, 6);
                    ctx.fill();
                    ctx.strokeStyle = playerNameForScore.length > 0 ? '#F5A623' : '#999999';
                    ctx.lineWidth = 1;
                    roundRect(ctx, submitX, submitY, submitW, submitH, 6);
                    ctx.stroke();

                    ctx.fillStyle = '#FFFFFF';
                    ctx.font = 'bold 14px Arial';
                    ctx.fillText('SUBMIT SCORE', cx, submitY + 20);

                    submitButtonRect = { x: submitX, y: submitY, w: submitW, h: submitH };

                    // Play Again button (skip submission)
                    const skipY2 = submitY + submitH + 12;
                    const skipW2 = canvas.width * 0.5;
                    const skipH2 = 28;
                    const skipX2 = cx - skipW2 / 2;

                    ctx.fillStyle = 'rgba(255, 255, 255, 0.06)';
                    roundRect(ctx, skipX2, skipY2, skipW2, skipH2, 6);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                    ctx.lineWidth = 1;
                    roundRect(ctx, skipX2, skipY2, skipW2, skipH2, 6);
                    ctx.stroke();

                    ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                    ctx.font = '13px Arial';
                    ctx.fillText('PLAY AGAIN', cx, skipY2 + 18);

                    playAgainButtonRect = { x: skipX2, y: skipY2, w: skipW2, h: skipH2 };
                }

                // Post-submission on new best screen
                if (deathScreenPhase === 'submitted' || scoreSubmitted) {
                    const subY = prevBestY + 24;
                    ctx.fillStyle = '#F5A623';
                    ctx.font = 'bold 16px Arial';
                    ctx.globalAlpha = contentAlpha;
                    ctx.fillText('Thanks for submitting!', cx, subY);
                    if (playerRank > 0) {
                        ctx.fillStyle = '#FFFFFF';
                        ctx.font = 'bold 14px Arial';
                        ctx.fillText('You ranked #' + playerRank + ' worldwide', cx, subY + 22);
                    }

                    // View Leaderboard button
                    const dlbBtnY2 = subY + 50;
                    const dlbBtnW2 = canvas.width * 0.55;
                    const dlbBtnH2 = 34;
                    const dlbBtnX2 = cx - dlbBtnW2 / 2;

                    ctx.fillStyle = 'rgba(200, 164, 74, 0.12)';
                    roundRect(ctx, dlbBtnX2, dlbBtnY2, dlbBtnW2, dlbBtnH2, 8);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(200, 164, 74, 0.4)';
                    ctx.lineWidth = 1;
                    roundRect(ctx, dlbBtnX2, dlbBtnY2, dlbBtnW2, dlbBtnH2, 8);
                    ctx.stroke();

                    ctx.fillStyle = '#C8A44A';
                    ctx.font = 'bold 13px Arial';
                    ctx.fillText('VIEW LEADERBOARD', cx, dlbBtnY2 + 22);
                    deathLeaderboardButtonRect = { x: dlbBtnX2, y: dlbBtnY2, w: dlbBtnW2, h: dlbBtnH2 };

                    // Play Again button
                    const paY2 = dlbBtnY2 + dlbBtnH2 + 14;
                    const paW2 = canvas.width * 0.55;
                    const paH2 = 34;
                    const paX2 = cx - paW2 / 2;

                    ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
                    roundRect(ctx, paX2, paY2, paW2, paH2, 8);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.lineWidth = 1;
                    roundRect(ctx, paX2, paY2, paW2, paH2, 8);
                    ctx.stroke();

                    ctx.fillStyle = '#FFFFFF';
                    ctx.font = 'bold 14px Arial';
                    ctx.fillText('PLAY AGAIN', cx, paY2 + 22);
                    playAgainButtonRect = { x: paX2, y: paY2, w: paW2, h: paH2 };
                }

            } else {
                // ============================================
                // NORMAL GAME OVER SCREEN (no new record)
                // ============================================

                ctx.fillStyle = '#FFFFFF';
                ctx.font = 'bold 32px Arial';
                ctx.fillText('GAME OVER', cx, canvas.height * 0.2);

                // Draw Baby Astro smaller
                ctx.save();
                ctx.translate(cx, canvas.height * 0.33);
                ctx.translate(0, Math.sin(elapsed * 1.5) * 3);
                ctx.scale(1.6, 1.6);
                const savedX2 = player.x;
                const savedY2 = player.y;
                player.x = 0;
                player.y = 0;
                player.rotation = 0.2; // tilted, sad
                drawBaby();
                player.x = savedX2;
                player.y = savedY2;
                ctx.restore();

                // Stats
                const statY = canvas.height * 0.5;

                // Depth
                ctx.fillStyle = '#FFFFFF';
                ctx.font = 'bold 36px Arial';
                ctx.fillText(displayDepth, cx, statY);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.font = '11px Arial';
                ctx.fillText('DEPTH', cx, statY + 18);

                // Zone
                ctx.fillStyle = '#CCCCCC';
                ctx.font = '16px Arial';
                ctx.fillText(deathZoneName, cx, statY + 48);

                // Best score
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.font = '13px Arial';
                ctx.fillText('Best: ' + Math.floor(bestDepth), cx, statY + 78);

                // Show leaderboard submission UI (only before submitting)
                if (deathScreenPhase === 'stats' && !scoreSubmitted && elapsed > 1.5) {
                    // Show message to submit name
                    ctx.fillStyle = '#FFFFFF';
                    ctx.font = '14px Arial';
                    ctx.globalAlpha = contentAlpha;
                    ctx.fillText('Submit your score to the leaderboard!', cx, statY + 110);

                    if (!deathInputLocked) {
                        ctx.font = '13px Arial';
                        ctx.fillText('Tap below to enter your name', cx, statY + 128);
                    }
                }

                // Name input and submit button (only before submitting)
                if (elapsed > 1.5 && !deathInputLocked && !scoreSubmitted && deathScreenPhase !== 'submitted') {
                    const inputY = statY + 150;
                    const inputW = canvas.width * 0.6;
                    const inputH = 36;
                    const inputX = cx - inputW / 2;

                    // Input field background
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
                    roundRect(ctx, inputX, inputY, inputW, inputH, 8);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                    ctx.lineWidth = 1;
                    roundRect(ctx, inputX, inputY, inputW, inputH, 8);
                    ctx.stroke();

                    // Store name input field position for click detection
                    nameInputRect = { x: inputX, y: inputY, w: inputW, h: inputH };

                    // Display current name or placeholder
                    ctx.fillStyle = '#FFFFFF';
                    ctx.font = '16px Arial';
                    ctx.textAlign = 'center';
                    const displayName = playerNameForScore || 'Enter name...';
                    ctx.fillText(displayName, cx, inputY + 24);

                    // Submit button
                    const submitY = inputY + inputH + 16;
                    const submitW = canvas.width * 0.5;
                    const submitH = 32;
                    const submitX = cx - submitW / 2;

                    ctx.fillStyle = playerNameForScore.length > 0 ? 'rgba(245, 166, 35, 0.8)' : 'rgba(150, 150, 150, 0.5)';
                    roundRect(ctx, submitX, submitY, submitW, submitH, 6);
                    ctx.fill();
                    ctx.strokeStyle = playerNameForScore.length > 0 ? '#F5A623' : '#999999';
                    ctx.lineWidth = 1;
                    roundRect(ctx, submitX, submitY, submitW, submitH, 6);
                    ctx.stroke();

                    ctx.fillStyle = '#FFFFFF';
                    ctx.font = 'bold 14px Arial';
                    ctx.fillText('SUBMIT SCORE', cx, submitY + 20);

                    submitButtonRect = { x: submitX, y: submitY, w: submitW, h: submitH };

                    // Play Again button (skip submission)
                    const skipY = submitY + submitH + 14;
                    const skipW = canvas.width * 0.5;
                    const skipH = 30;
                    const skipX = cx - skipW / 2;

                    ctx.fillStyle = 'rgba(255, 255, 255, 0.06)';
                    roundRect(ctx, skipX, skipY, skipW, skipH, 6);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                    ctx.lineWidth = 1;
                    roundRect(ctx, skipX, skipY, skipW, skipH, 6);
                    ctx.stroke();

                    ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                    ctx.font = '13px Arial';
                    ctx.fillText('PLAY AGAIN', cx, skipY + 20);

                    playAgainButtonRect = { x: skipX, y: skipY, w: skipW, h: skipH };
                }

                // Post-submission state
                if (deathScreenPhase === 'submitted' || scoreSubmitted) {
                    // Thanks message
                    ctx.fillStyle = '#F5A623';
                    ctx.font = 'bold 20px Arial';
                    ctx.globalAlpha = contentAlpha;
                    ctx.fillText('Thanks for submitting!', cx, statY + 115);

                    if (playerRank > 0) {
                        ctx.fillStyle = '#FFFFFF';
                        ctx.font = 'bold 16px Arial';
                        ctx.fillText('You ranked #' + playerRank + ' worldwide', cx, statY + 145);
                    }

                    // View Leaderboard button
                    const dlbBtnY = statY + 175;
                    const dlbBtnW = canvas.width * 0.55;
                    const dlbBtnH = 34;
                    const dlbBtnX = cx - dlbBtnW / 2;

                    ctx.globalAlpha = contentAlpha;
                    ctx.fillStyle = 'rgba(200, 164, 74, 0.12)';
                    roundRect(ctx, dlbBtnX, dlbBtnY, dlbBtnW, dlbBtnH, 8);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(200, 164, 74, 0.4)';
                    ctx.lineWidth = 1;
                    roundRect(ctx, dlbBtnX, dlbBtnY, dlbBtnW, dlbBtnH, 8);
                    ctx.stroke();

                    ctx.fillStyle = '#C8A44A';
                    ctx.font = 'bold 13px Arial';
                    ctx.fillText('VIEW LEADERBOARD', cx, dlbBtnY + 22);
                    deathLeaderboardButtonRect = { x: dlbBtnX, y: dlbBtnY, w: dlbBtnW, h: dlbBtnH };

                    // Play Again button
                    const paY3 = dlbBtnY + dlbBtnH + 14;
                    const paW3 = canvas.width * 0.55;
                    const paH3 = 34;
                    const paX3 = cx - paW3 / 2;

                    ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
                    roundRect(ctx, paX3, paY3, paW3, paH3, 8);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.lineWidth = 1;
                    roundRect(ctx, paX3, paY3, paW3, paH3, 8);
                    ctx.stroke();

                    ctx.fillStyle = '#FFFFFF';
                    ctx.font = 'bold 14px Arial';
                    ctx.fillText('PLAY AGAIN', cx, paY3 + 22);
                    playAgainButtonRect = { x: paX3, y: paY3, w: paW3, h: paH3 };
                }
            }

            // Death leaderboard overlay
            if (deathView === 'leaderboard') {
                ctx.globalAlpha = 1;
                drawLeaderboardView();
            }

            ctx.globalAlpha = 1;
        }

        // Main game loop
        let lastTime = Date.now();

        function gameLoop() {
            const now = Date.now();
            const deltaTime = Math.min((now - lastTime) / 1000, 0.016);
            lastTime = now;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameState === GAME_STATE.MENU) {
                drawBackground();
                if (menuView === 'leaderboard') {
                    drawLeaderboardView();
                } else {
                    drawMenu();
                }
                if (inputActive && menuView === 'main') {
                    startNewGame();
                    inputActive = false;
                }
            } else if (gameState === GAME_STATE.PLAYING) {
                update(deltaTime);
                drawBackground();
                drawObstacles();
                drawParticles();
                drawBaby();
                drawHUD();
            } else if (gameState === GAME_STATE.DEAD) {
                deathTime += deltaTime;
                drawBackground();
                drawObstacles();
                drawParticles();
                drawBaby();
                drawDeath();
                // Restart only happens via PLAY AGAIN button in handleCanvasClick
                inputActive = false;
            }

            requestAnimationFrame(gameLoop);
        }

        // Initialize name input element
        const playerNameInput = document.getElementById('playerNameInput');

        // Handle name input changes
        playerNameInput.addEventListener('input', (e) => {
            playerNameForScore = e.target.value.slice(0, 20);
        });

        // Shared click handler for buttons
        function handleCanvasClick(x, y) {
            // Menu state: leaderboard and back buttons
            if (gameState === GAME_STATE.MENU) {
                if (menuView === 'main' && leaderboardButtonRect.x &&
                    x >= leaderboardButtonRect.x && x <= leaderboardButtonRect.x + leaderboardButtonRect.w &&
                    y >= leaderboardButtonRect.y && y <= leaderboardButtonRect.y + leaderboardButtonRect.h) {
                    menuView = 'leaderboard';
                    fetchLeaderboard();
                    inputActive = false;
                    return true;
                }
                if (menuView === 'leaderboard' && backButtonRect.x &&
                    x >= backButtonRect.x && x <= backButtonRect.x + backButtonRect.w &&
                    y >= backButtonRect.y && y <= backButtonRect.y + backButtonRect.h) {
                    menuView = 'main';
                    inputActive = false;
                    return true;
                }
                return false;
            }
            // Death state: leaderboard, back, and play again buttons
            if (gameState === GAME_STATE.DEAD) {
                // Play Again button (skip submission)
                if (deathView === 'main' && playAgainButtonRect.x &&
                    x >= playAgainButtonRect.x && x <= playAgainButtonRect.x + playAgainButtonRect.w &&
                    y >= playAgainButtonRect.y && y <= playAgainButtonRect.y + playAgainButtonRect.h) {
                    startNewGame();
                    inputActive = false;
                    return true;
                }
                if (deathView === 'main' && deathLeaderboardButtonRect.x &&
                    x >= deathLeaderboardButtonRect.x && x <= deathLeaderboardButtonRect.x + deathLeaderboardButtonRect.w &&
                    y >= deathLeaderboardButtonRect.y && y <= deathLeaderboardButtonRect.y + deathLeaderboardButtonRect.h) {
                    deathView = 'leaderboard';
                    fetchLeaderboard();
                    inputActive = false;
                    return true;
                }
                if (deathView === 'leaderboard' && backButtonRect.x &&
                    x >= backButtonRect.x && x <= backButtonRect.x + backButtonRect.w &&
                    y >= backButtonRect.y && y <= backButtonRect.y + backButtonRect.h) {
                    deathView = 'main';
                    inputActive = false;
                    return true;
                }
                if (deathView === 'leaderboard') {
                    inputActive = false;
                    return true;
                }
                return false;
            }
            return false;
        }

        // Handle canvas clicks for menu and death screen interactions
        canvas.addEventListener('click', async (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (handleCanvasClick(x, y)) return;

            if (gameState !== GAME_STATE.DEAD) return;

            // Check if name input field was clicked
            if (nameInputRect.x && x >= nameInputRect.x && x <= nameInputRect.x + nameInputRect.w &&
                y >= nameInputRect.y && y <= nameInputRect.y + nameInputRect.h) {
                playerNameInput.style.left = (rect.left + nameInputRect.x) + 'px';
                playerNameInput.style.top = (rect.top + nameInputRect.y) + 'px';
                playerNameInput.style.width = nameInputRect.w + 'px';
                playerNameInput.style.height = nameInputRect.h + 'px';
                playerNameInput.style.opacity = '0';
                playerNameInput.value = playerNameForScore;
                playerNameInput.focus();
                playerNameInput.select();
                return;
            }

            // Check if submit button was clicked
            if (submitButtonRect.x && x >= submitButtonRect.x && x <= submitButtonRect.x + submitButtonRect.w &&
                y >= submitButtonRect.y && y <= submitButtonRect.y + submitButtonRect.h &&
                playerNameForScore.length > 0) {
                deathScreenPhase = 'submitted';
                await submitScore(playerNameForScore);
                playerNameInput.blur();
            }
        });

        // Handle touch for menu and death screen
        canvas.addEventListener('touchstart', async (e) => {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;

            if (handleCanvasClick(x, y)) return;

            if (gameState !== GAME_STATE.DEAD) return;

            if (nameInputRect.x && x >= nameInputRect.x && x <= nameInputRect.x + nameInputRect.w &&
                y >= nameInputRect.y && y <= nameInputRect.y + nameInputRect.h) {
                playerNameInput.style.left = (rect.left + nameInputRect.x) + 'px';
                playerNameInput.style.top = (rect.top + nameInputRect.y) + 'px';
                playerNameInput.style.width = nameInputRect.w + 'px';
                playerNameInput.style.height = nameInputRect.h + 'px';
                playerNameInput.style.opacity = '0';
                playerNameInput.value = playerNameForScore;
                playerNameInput.focus();
                playerNameInput.select();
                return;
            }

            if (submitButtonRect.x && x >= submitButtonRect.x && x <= submitButtonRect.x + submitButtonRect.w &&
                y >= submitButtonRect.y && y <= submitButtonRect.y + submitButtonRect.h &&
                playerNameForScore.length > 0) {
                deathScreenPhase = 'submitted';
                await submitScore(playerNameForScore);
                playerNameInput.blur();
            }
        });

        // Fetch leaderboard on page load
        fetchLeaderboard();

        // Start the game
        gameLoop();

        // Prevent scrolling
        document.body.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
